name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd "${{ secrets.DEPLOY_DIR }}" || exit 1

            # Kill process on port 4000 if running (Git Bash on Windows)
            PID=$(netstat -aon 2>/dev/null | grep ':4000 ' | grep LISTENING | awk '{print $NF}' | head -1)
            if [ -n "$PID" ]; then
              taskkill //PID "$PID" //F 2>/dev/null || true
            fi

            git pull

            cd src
            pnpm build

            # Start dev server detached from SSH session
            nohup pnpm dev > /dev/null 2>&1 &
