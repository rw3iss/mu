name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_DIR }}

            # Kill process on port 4000 if running
            # Windows (cmd over SSH):
            for /f "tokens=5" %%a in ('netstat -aon 2^>nul ^| findstr :4000 ^| findstr LISTENING') do taskkill /PID %%a /F 2>nul
            # Linux alternative (uncomment if needed):
            # lsof -ti:4000 | xargs -r kill -9

            git pull
            cd src
            pnpm build

            # Start dev server in background (detached from SSH session)
            # Windows:
            start "" /b pnpm dev
            # Linux alternative:
            # nohup pnpm dev > /dev/null 2>&1 &
