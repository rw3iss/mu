name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        run: |
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          cat > /tmp/deploy.sh << 'EOF'
          source ~/.bash_profile
          cd "$DEPLOY_DIR" || exit 1
          PID=$(netstat -aon 2>/dev/null | grep ":4000 " | grep LISTENING | awk '{print $NF}' | head -1)
          if [ -n "$PID" ]; then taskkill //PID "$PID" //F 2>/dev/null || true; fi
          git pull
          cd src
          pnpm build
          nohup pnpm dev > /dev/null 2>&1 < /dev/null &
          disown
          sleep 2
          echo "Server started, verifying..."
          netstat -aon | grep ":4000 " | grep LISTENING || echo "Warning: port 4000 not yet listening (may still be starting)"
          EOF

          ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} bash -s < /tmp/deploy.sh
          rm -f /tmp/deploy_key /tmp/deploy.sh
