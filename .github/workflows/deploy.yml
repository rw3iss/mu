name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        run: |
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          # Pipe the deploy command via stdin — Windows OpenSSH treats command args as a single filename
          echo 'if [ -n "$DEPLOY_DIR" ]; then cd "$DEPLOY_DIR" && bash src/deploy.sh; else ./deploy.sh; fi' | timeout 120 ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} || EXIT_CODE=$?
          rm -f /tmp/deploy_key
          if [ "${EXIT_CODE:-0}" -eq 124 ]; then
            echo "SSH session timed out — deploy may still be running on server"
            exit 0
          elif [ "${EXIT_CODE:-0}" -ne 0 ]; then
            exit $EXIT_CODE
          fi
